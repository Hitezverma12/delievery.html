<!DOCTYPE html>
<html>
<body>
    <h1>Convert a JavaScript method into a JSON string, and send it into the server</h1>
    <p id="result"></p>
    <script>
        var myObj = {name: "Riya", age: 12, grade: 7};
        var myJSON = JSON.stringify(myObj);  //Converts object into JSON to return data to the server
        var newObj = JSON.parse(myJSON);  //Converts JSON string back into an object


        document.getElementById("result").innerHTML = newObj.name;
    </script>
</body>



</html>
